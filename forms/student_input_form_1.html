<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Input Form - Page 1</title>
    <link rel="icon" type="image/png" href="../img/cav.png">
    <style>
        body {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            background:
                url('../pix/drone111.jpg') center center / cover no-repeat fixed,
                linear-gradient(120deg, rgba(13, 57, 16, 0.82) 0%, rgba(20, 81, 26, 0.78) 42%, rgba(32, 96, 24, 0.74) 100%),
                radial-gradient(circle at 16% 18%, rgba(217, 228, 65, 0.28) 0%, rgba(217, 228, 65, 0) 35%),
                radial-gradient(circle at 85% 80%, rgba(140, 207, 82, 0.22) 0%, rgba(140, 207, 82, 0) 36%),
                linear-gradient(120deg, rgba(10, 42, 13, 0.92) 0%, rgba(17, 70, 23, 0.88) 50%, rgba(30, 88, 26, 0.86) 100%);
            background-blend-mode: multiply, normal, screen, screen, normal;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 24px 16px;
            box-sizing: border-box;
        }
        .form-container {
            width: min(100%, 520px);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(7px);
            padding: 30px 28px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 24px 45px rgba(8, 28, 10, 0.28);
            box-sizing: border-box;
        }
        .form-container h2 {
            margin: 4px 0 24px 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #14511a;
        }
        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #1e2d1f;
        }
        .form-group input[type="text"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #c6d7c7;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            color: #132214;
            background: #fcfffc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-group input[type="text"]:focus,
        .form-group input[type="email"]:focus {
            border-color: #2c7a2a;
            box-shadow: 0 0 0 4px rgba(44, 122, 42, 0.14);
            outline: none;
        }
        .form-group input[disabled] {
            background: #eef3ee;
            color: #7a887a;
            cursor: not-allowed;
            box-shadow: none;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        .button-group button {
            flex: 1;
            min-height: 44px;
            padding: 10px 16px;
            border: 1px solid transparent;
            color: white;
            cursor: pointer;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .button-group .btn-primary {
            background: linear-gradient(135deg, #206018 0%, #2f8a2b 100%);
            box-shadow: 0 10px 18px rgba(32, 96, 24, 0.25);
        }
        .button-group .btn-secondary {
            background: #eef2ef;
            color: #1f3b22;
            border-color: #d3ddd3;
        }
        .button-group button:hover {
            transform: translateY(-1px);
        }
        .button-group .btn-primary:hover {
            box-shadow: 0 12px 20px rgba(32, 96, 24, 0.34);
        }
        .button-group .btn-secondary:hover {
            background: #e3eae4;
        }
        @media screen and (max-width: 640px) {
            body {
                padding: 12px;
            }
            .form-container {
                padding: 22px 16px;
                border-radius: 16px;
            }
            .form-container h2 {
                font-size: 20px;
                margin-bottom: 18px;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>STUDENT INPUT FORM (1/2)</h2>
    <form id="form1">
        <div class="form-group">
            <label for="student-id">Student I.D</label>
            <input type="text" id="student-id" name="student_id" placeholder="ex. 220100064" required>
            <div id="student-id-message" style="color: red; font-size: 13px; margin-top: 3px; display: none;"></div>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="ex. juan.delacruz@student.edu.ph" required>
            <div style="color: #5d715e; font-size: 12px; margin-top: 5px;">Use an email domain allowed by the administrator. <strong>@cvsu.edu.ph</strong> is always accepted.</div>
            <div id="email-message" style="color: red; font-size: 13px; margin-top: 3px; display: none;"></div>
        </div>
        <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last_name" placeholder="ex. Dela Cruz" required disabled>
        </div>
        <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first_name" placeholder="ex. Juan" required disabled>
        </div>
        <div class="form-group">
            <label for="middle-name">Middle Name / Initial <span style="color: #666; font-size: 12px;">(Optional)</span></label>
            <input type="text" id="middle-name" name="middle_name" placeholder="ex. Reyes or R. (Leave blank if no middle name)" disabled>
            <div style="color: #5d715e; font-size: 12px; margin-top: 5px;">You may enter your full middle name or just your middle initial. The system matches it against the official masterlist by initial.</div>
        </div>
        <div class="button-group">
            <button type="button" id="next-button" class="btn-primary" onclick="saveAndNext()" disabled>Next</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='../index.html'">Back</button>
        </div>
    </form>
</div>
<script>
    function isValidEmailFormat(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/i.test(String(value || '').trim());
    }

    function showEmailMessage(message) {
        const messageDiv = document.getElementById('email-message');
        messageDiv.textContent = message;
        messageDiv.style.display = message ? 'block' : 'none';
    }

    // Prefill fields if data exists
    window.onload = function() {
        const data = JSON.parse(localStorage.getItem('studentFormPage1') || '{}');
        if (data.student_id) document.getElementById('student-id').value = data.student_id;
        if (data.last_name) document.getElementById('last-name').value = data.last_name;
        if (data.first_name) document.getElementById('first-name').value = data.first_name;
        if (data.middle_name) document.getElementById('middle-name').value = data.middle_name;
        if (data.email) document.getElementById('email').value = data.email;
        validateEmailAgainstPolicy(emailInput.value);
    };
    // Live check for student number uniqueness
    let studentIdCheckTimeout = null;
    const studentIdInput = document.getElementById('student-id');
    const emailInput = document.getElementById('email');
    const lastNameInput = document.getElementById('last-name');
    const firstNameInput = document.getElementById('first-name');
    const middleNameInput = document.getElementById('middle-name');
    const nextButton = document.getElementById('next-button');
    const gatedInputs = [lastNameInput, firstNameInput, middleNameInput];
    let isStudentIdValid = false;
    let isEmailPolicyAllowed = false;
    let emailPolicyMessage = '';
    let emailCheckTimeout = null;
    let emailPolicyRequestId = 0;
    let studentIdValidationMessage = 'Please enter a valid student number that does not exist in the system';

    function updateProfileFieldGate() {
        const hasValidAllowedEmail = isEmailPolicyAllowed;
        gatedInputs.forEach((input) => {
            input.disabled = !hasValidAllowedEmail;
        });
        nextButton.disabled = !hasValidAllowedEmail;
        nextButton.style.opacity = hasValidAllowedEmail ? '1' : '0.65';
        nextButton.style.cursor = hasValidAllowedEmail ? 'pointer' : 'not-allowed';

        if (!emailInput.value.trim()) {
            showEmailMessage('');
            return;
        }

        showEmailMessage(hasValidAllowedEmail ? '' : emailPolicyMessage);
    }

    function validateEmailAgainstPolicy(emailValue) {
        const trimmedEmail = String(emailValue || '').trim();
        const requestId = ++emailPolicyRequestId;

        if (!trimmedEmail) {
            isEmailPolicyAllowed = false;
            emailPolicyMessage = '';
            updateProfileFieldGate();
            return;
        }

        if (!isValidEmailFormat(trimmedEmail)) {
            isEmailPolicyAllowed = false;
            emailPolicyMessage = 'Enter a valid email address first.';
            updateProfileFieldGate();
            return;
        }

        isEmailPolicyAllowed = false;
        emailPolicyMessage = 'Checking email policy...';
        updateProfileFieldGate();

        fetch('../auth/email_policy.php?email=' + encodeURIComponent(trimmedEmail))
            .then(response => response.json())
            .then(data => {
                if (requestId !== emailPolicyRequestId) {
                    return;
                }

                if (data && data.allowed === true) {
                    isEmailPolicyAllowed = true;
                    emailPolicyMessage = '';
                } else {
                    isEmailPolicyAllowed = false;
                    emailPolicyMessage = (data && data.message) ? data.message : 'Email domain is not allowed for student accounts.';
                }

                updateProfileFieldGate();
            })
            .catch(() => {
                if (requestId !== emailPolicyRequestId) {
                    return;
                }

                isEmailPolicyAllowed = false;
                emailPolicyMessage = 'Unable to validate email policy right now. Please try again.';
                updateProfileFieldGate();
            });
    }

    studentIdInput.addEventListener('input', function() {
        const studentId = this.value.trim();
        const messageDiv = document.getElementById('student-id-message');
        messageDiv.style.display = 'none';
        messageDiv.textContent = '';
        isStudentIdValid = false;
        studentIdValidationMessage = 'Please enter a valid student number that does not exist in the system';

        if (!studentId) return;
        // Check if not 9 digits
        if (!/^\d{9}$/.test(studentId)) {
            messageDiv.textContent = 'Must be 9 digit student number';
            messageDiv.style.display = 'block';
            studentIdValidationMessage = 'Must be 9 digit student number';
            return;
        }
        
        clearTimeout(studentIdCheckTimeout);
        studentIdCheckTimeout = setTimeout(() => {
            // Show checking message while fetching
            messageDiv.textContent = 'Checking student number...';
            messageDiv.style.display = 'block';
            
            fetch('../auth/check_student_id.php?student_id=' + encodeURIComponent(studentId))
                .then(response => response.json())
                .then(data => {
                    if (data.exists) {
                        messageDiv.textContent = 'Student number already exist';
                        messageDiv.style.display = 'block';
                        isStudentIdValid = false;
                        studentIdValidationMessage = 'Student number already exist';
                        // Clear and disable subsequent fields
                        emailInput.value = '';
                        lastNameInput.value = '';
                        firstNameInput.value = '';
                        middleNameInput.value = '';
                        validateEmailAgainstPolicy('');
                    } else if (data.allowed === false) {
                        messageDiv.textContent = data.message || 'This student number is not included in the official masterlist.';
                        messageDiv.style.display = 'block';
                        isStudentIdValid = false;
                        studentIdValidationMessage = messageDiv.textContent;
                        emailInput.value = '';
                        lastNameInput.value = '';
                        firstNameInput.value = '';
                        middleNameInput.value = '';
                        validateEmailAgainstPolicy('');
                    } else {
                        messageDiv.style.display = 'none';
                        isStudentIdValid = true;
                    }
                })
                .catch(error => {
                    console.error('Error checking student ID:', error);
                    messageDiv.textContent = 'Error checking student number';
                    messageDiv.style.display = 'block';
                });
        }, 350);
    });

    // Prevent focus to email if student id is not valid
    emailInput.addEventListener('focus', function(e) {
        const studentId = studentIdInput.value.trim();
        const messageDiv = document.getElementById('student-id-message');
        
        if (!/^\d{9}$/.test(studentId)) {
            messageDiv.textContent = 'Must be 9 digit student number';
            messageDiv.style.display = 'block';
            studentIdInput.focus();
            e.preventDefault();
            return;
        }

        if (!isStudentIdValid) {
            messageDiv.textContent = studentIdValidationMessage;
            messageDiv.style.display = 'block';
            studentIdInput.focus();
            e.preventDefault();
        }
    });

    emailInput.addEventListener('input', function() {
        const emailValue = emailInput.value;
        clearTimeout(emailCheckTimeout);
        emailCheckTimeout = setTimeout(() => {
            validateEmailAgainstPolicy(emailValue);
        }, 300);
    });

    gatedInputs.forEach((input) => {
        input.addEventListener('focus', function(e) {
            const studentId = studentIdInput.value.trim();
            const messageDiv = document.getElementById('student-id-message');
            if (!/^\d{9}$/.test(studentId)) {
                messageDiv.textContent = 'Must be 9 digit student number';
                messageDiv.style.display = 'block';
                studentIdInput.focus();
                e.preventDefault();
                return;
            }

            if (!isStudentIdValid) {
                messageDiv.textContent = studentIdValidationMessage;
                messageDiv.style.display = 'block';
                studentIdInput.focus();
                e.preventDefault();
                return;
            }

            if (!isEmailPolicyAllowed) {
                showEmailMessage(emailPolicyMessage || 'Enter an allowed email first.');
                emailInput.focus();
                e.preventDefault();
            }
        });
    });

    function saveAndNext() {
        const form = document.getElementById('form1');
        const studentId = form.student_id.value.trim();
        const messageDiv = document.getElementById('student-id-message');
        messageDiv.style.display = 'none';
        messageDiv.textContent = '';
        
        // Validate Student ID
        if (!studentId) {
            messageDiv.textContent = 'Student I.D is required.';
            messageDiv.style.display = 'block';
            return;
        }
        if (!/^\d{9}$/.test(studentId)) {
            messageDiv.textContent = 'Must be 9 digit';
            messageDiv.style.display = 'block';
            return;
        }
        
        // Validate required name fields
        const lastName = form.last_name.value.trim();
        const firstName = form.first_name.value.trim();
        const email = form.email.value.trim();
        
        if (!lastName) {
            alert('Last name is required.');
            form.last_name.focus();
            return;
        }
        
        if (!firstName) {
            alert('First name is required.');
            form.first_name.focus();
            return;
        }
        
        if (!email) {
            alert('Email address is required.');
            form.email.focus();
            return;
        }

        if (!isEmailPolicyAllowed) {
            showEmailMessage(emailPolicyMessage || 'Enter an allowed email first.');
            form.email.focus();
            return;
        }
        
        // Check student number uniqueness via AJAX
        fetch('../auth/check_student_id.php?student_id=' + encodeURIComponent(studentId))
            .then(response => response.json())
            .then(data => {
                if (data.exists) {
                    messageDiv.textContent = 'Student number already exist';
                    messageDiv.style.display = 'block';
                } else if (data.allowed === false) {
                    messageDiv.textContent = data.message || 'This student number is not included in the official masterlist.';
                    messageDiv.style.display = 'block';
                } else {
                    // Prepare data with proper formatting
                    const middleName = form.middle_name.value.trim();
                    const saveData = {
                        student_id: studentId,
                        last_name: lastName,
                        first_name: firstName,
                        middle_name: middleName || '', // Convert null/undefined to empty string for storage
                        email: email
                    };
                    localStorage.setItem('studentFormPage1', JSON.stringify(saveData));
                    window.location.href = 'student_input_form_2.html';
                }
            })
            .catch(() => {
                alert('Error checking Student I.D. Please try again.');
            });
    }
</script>
</body>
</html>
